<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Selfie → Retro NFT</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            padding: 20px; 
            background: #111;
            color: #fff;
        }
        h1 { margin-bottom: 10px; }
        button {
            font-size: 18px;
            padding: 12px 24px;
            margin: 8px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .btn-gallery { background: #4CAF50; color: white; }
        .btn-camera { background: #2196F3; color: white; }
        #result { 
            max-width: 512px; 
            margin: 30px auto; 
            border: 4px solid #000; 
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            display: block;
        }
        #instructions {
            max-width: 512px;
            margin: 20px auto;
            font-size: 15px;
            opacity: 0.9;
            line-height: 1.4;
        }
        .tip {
            background: #333;
            padding: 12px;
            border-radius: 8px;
            margin: 20px auto;
            max-width: 512px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>📸 Selfie → Retro NFT</h1>
    
    <div class="tip">
        <strong>Tip:</strong><br>
        You are on a desktop/laptop (camera won’t work here).<br>
        Use the <strong>Gallery</strong> button to pick a photo.
    </div>

    <p id="instructions">
        Now preserving original proportions (no more stretching!)<br>
        Rectangular photos are automatically center-cropped to square.<br>
        Grayscale + big 32×32 retro blocks applied after.
    </p>

    <button class="btn-gallery" onclick="selectGallery()">📁 Choose from gallery</button>
    <button class="btn-camera" onclick="selectCamera()">📸 Take selfie with camera</button>

    <!-- Hidden file inputs -->
    <input type="file" id="galleryInput" accept="image/*" style="display:none">
    <input type="file" id="cameraInput" accept="image/*" capture="user" style="display:none">

    <canvas id="canvas" width="512" height="512" style="display:none"></canvas>
    <img id="result" alt="Your Retro NFT">

    <script>
        async function processSelfie(file) {
            const img = new Image();
            img.src = URL.createObjectURL(file);
            await new Promise(r => img.onload = r);

            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 512;
            canvas.height = 512;

            // === NEW: Center-crop to square while keeping original proportions ===
            const originalW = img.width;
            const originalH = img.height;
            const size = Math.min(originalW, originalH);           // side length of square crop
            const sx = (originalW - size) / 2;                     // center X
            const sy = (originalH - size) / 2;                     // center Y

            // Draw the cropped square portion, scaled to 512×512 (no distortion)
            ctx.drawImage(img, sx, sy, size, size, 0, 0, 512, 512);

            // 2. Grayscale (now on the perfectly square, non-stretched image)
            let imageData = ctx.getImageData(0, 0, 512, 512);
            let data = imageData.data;
            for (let i = 0; i < data.length; i += 4) {
                const avg = (data[i] + data[i+1] + data[i+2]) / 3;
                data[i] = data[i+1] = data[i+2] = avg;
            }
            ctx.putImageData(imageData, 0, 0);

            // 3. Pixelate with big blocks (on top of the grayscale)
            const pixelSize = 32;                    // big retro blocks
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = 512 / pixelSize;
            tempCanvas.height = 512 / pixelSize;
            const tCtx = tempCanvas.getContext('2d');
            tCtx.imageSmoothingEnabled = false;
            tCtx.drawImage(canvas, 0, 0, tempCanvas.width, tempCanvas.height);

            ctx.imageSmoothingEnabled = false;
            ctx.drawImage(tempCanvas, 0, 0, 512, 512);

            // 4. Delete ~35% of pixels (solid black retro style)
            imageData = ctx.getImageData(0, 0, 512, 512);
            data = imageData.data;
            for (let i = 0; i < data.length; i += 4) {
                if (Math.random() < 0.35) {
                    data[i]   = 0;   // R
                    data[i+1] = 0;   // G
                    data[i+2] = 0;   // B
                    data[i+3] = 255; // solid black
                }
            }
            ctx.putImageData(imageData, 0, 0);

            return canvas.toDataURL('image/png');
        }

        async function processAndShow(file) {
            const resultImg = document.getElementById('result');
            try {
                const base64 = await processSelfie(file);
                resultImg.src = base64;
            } catch (err) {
                console.error(err);
                alert('Something went wrong. Please try another photo.');
            }
        }

        // Gallery button
        function selectGallery() {
            document.getElementById('galleryInput').click();
        }

        // Camera button (only works on phones)
        function selectCamera() {
            document.getElementById('cameraInput').click();
        }

        // Event listeners
        document.getElementById('galleryInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file) await processAndShow(file);
        });

        document.getElementById('cameraInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file) await processAndShow(file);
        });
    </script>
</body>
</html>
