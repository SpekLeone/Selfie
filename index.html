<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Selfie → Retro NFT</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            padding: 20px 15px; 
            background: #111;
            color: #fff;
            margin: 0;
            min-height: 100vh;
        }
        h1 { 
            margin: 10px 0 20px; 
            font-size: 28px;
        }
        button {
            font-size: 20px;
            padding: 16px 32px;
            margin: 12px 8px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            max-width: 320px;
        }
        .btn-gallery { background: #4CAF50; color: white; }
        .btn-camera { background: #2196F3; color: white; }

        #result { 
            max-width: 100%;
            width: 512px;
            height: auto;
            margin: 30px auto;
            border: 6px solid #000;
            box-shadow: 0 0 25px rgba(0,0,0,0.9);
            display: block;
            border-radius: 8px;
        }

        #instructions {
            max-width: 512px;
            margin: 20px auto;
            font-size: 16px;
            opacity: 0.9;
            line-height: 1.5;
        }

        .tip {
            background: #222;
            padding: 16px;
            border-radius: 12px;
            margin: 20px auto;
            max-width: 512px;
            font-size: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        @media (max-width: 480px) {
            h1 { font-size: 24px; }
            button { font-size: 18px; padding: 14px 24px; }
            #result { border-width: 4px; }
        }
    </style>
</head>
<body>
    <h1>📸 Selfie → Retro NFT</h1>
    
    <div class="tip">
        <strong>Tip:</strong><br>
        You are on a desktop/laptop (camera won’t work here).<br>
        Use the <strong>Gallery</strong> button to pick a photo.
    </div>

    <button class="btn-gallery" onclick="selectGallery()">📁 Choose from gallery</button>
    <button class="btn-camera" onclick="selectCamera()">📸 Take selfie with camera</button>

    <!-- Hidden file inputs -->
    <input type="file" id="galleryInput" accept="image/*" style="display:none">
    <input type="file" id="cameraInput" accept="image/*" capture="user" style="display:none">

    <canvas id="canvas" width="512" height="512" style="display:none"></canvas>
    <img id="result" alt="Your Retro NFT">

    <script>
        async function processSelfie(file) {
            const img = new Image();
            img.src = URL.createObjectURL(file);
            await new Promise(r => img.onload = r);

            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 512;
            canvas.height = 512;

            // 0. Random grey background
            const randomGray = Math.floor(Math.random() * 140) + 40;
            ctx.fillStyle = `rgb(${randomGray}, ${randomGray}, ${randomGray})`;
            ctx.fillRect(0, 0, 512, 512);

            // 1. Center-crop selfie
            const originalW = img.width;
            const originalH = img.height;
            const size = Math.min(originalW, originalH);
            const sx = (originalW - size) / 2;
            const sy = (originalH - size) / 2;
            ctx.drawImage(img, sx, sy, size, size, 0, 0, 512, 512);

            // 2. Grayscale
            let imageData = ctx.getImageData(0, 0, 512, 512);
            let data = imageData.data;
            for (let i = 0; i < data.length; i += 4) {
                const avg = (data[i] + data[i + 1] + data[i + 2]) / 3;
                data[i] = data[i + 1] = data[i + 2] = avg;
            }
            ctx.putImageData(imageData, 0, 0);

            // 3. Random black holes (10% as in your version)
            imageData = ctx.getImageData(0, 0, 512, 512);
            data = imageData.data;
            for (let i = 0; i < data.length; i += 4) {
                if (Math.random() < 0.10) {
                    data[i]   = 0;
                    data[i + 1] = 0;
                    data[i + 2] = 0;
                    data[i + 3] = 175;
                }
            }
            ctx.putImageData(imageData, 0, 0);

            // 4. Pixelate with big 16×16 blocks
            const pixelSize = 16;
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = 512 / pixelSize;
            tempCanvas.height = 512 / pixelSize;
            const tCtx = tempCanvas.getContext('2d');
            tCtx.imageSmoothingEnabled = false;
            tCtx.drawImage(canvas, 0, 0, tempCanvas.width, tempCanvas.height);

            ctx.imageSmoothingEnabled = false;
            ctx.drawImage(tempCanvas, 0, 0, 512, 512);

            // 5. Brightness boost
            const brightnessBoost = 40;
            const contrastFactor = 1.4;

            imageData = ctx.getImageData(0, 0, 512, 512);
            data = imageData.data;
            for (let i = 0; i < data.length; i += 4) {
                const gray = data[i];
                let contrasted = 128 + (gray - 128) * contrastFactor;
                let bright = Math.min(255, Math.max(0, contrasted + brightnessBoost));
                data[i] = data[i + 1] = data[i + 2] = bright;
            }
            ctx.putImageData(imageData, 0, 0);

            return canvas.toDataURL('image/png');
        }

        async function processAndShow(file) {
            const resultImg = document.getElementById('result');
            try {
                const base64 = await processSelfie(file);
                resultImg.src = base64;
            } catch (err) {
                console.error(err);
                alert('Something went wrong. Please try another photo.');
            }
        }

        function selectGallery() {
            document.getElementById('galleryInput').click();
        }

        function selectCamera() {
            document.getElementById('cameraInput').click();
        }

        // Event listeners
        document.getElementById('galleryInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file) await processAndShow(file);
        });

        document.getElementById('cameraInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file) await processAndShow(file);
        });
    </script>
</body>
</html>
