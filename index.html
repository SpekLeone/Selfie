<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Selfie → Retro NFT</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            padding: 20px 15px; 
            background: #111;
            color: #fff;
            margin: 0;
            min-height: 100vh;
        }
        h1 { 
            margin: 10px 0 20px; 
            font-size: 28px;
        }
        button {
            font-size: 20px;
            padding: 16px 32px;
            margin: 12px 8px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            max-width: 320px;
        }
        .btn-gallery { background: #4CAF50; color: white; }
        .btn-camera { background: #2196F3; color: white; }

        #result { 
            max-width: 100%;
            width: 1024px;
            height: auto;
            margin: 30px auto;
            border: 6px solid #000; 
            box-shadow: 0 0 25px rgba(0,0,0,0.9);
            display: block;
            border-radius: 8px;
        }

        #instructions {
            max-width: 1024px;
            margin: 20px auto;
            font-size: 16px;
            opacity: 0.9;
            line-height: 1.5;
        }

        .tip {
            background: #222;
            padding: 16px;
            border-radius: 12px;
            margin: 20px auto;
            max-width: 1024px;
            font-size: 15px;
        }
    </style>
</head>
<body>
    <h1>📸 Selfie → Retro NFT</h1>
    
    <div class="tip">
        <strong>Tip:</strong><br>
        You are on a desktop/laptop (camera won’t work here).<br>
        Use the <strong>Gallery</strong> button to pick a photo.
    </div>

    <button class="btn-gallery" onclick="selectGallery()">📁 Choose from gallery</button>
    <button class="btn-camera" onclick="selectCamera()">📸 Take selfie with camera</button>

    <!-- Hidden file inputs -->
    <input type="file" id="galleryInput" accept="image/*" style="display:none">
    <input type="file" id="cameraInput" accept="image/*" capture="user" style="display:none">

    <canvas id="canvas" width="1024" height="1024" style="display:none"></canvas>
    <img id="result" alt="Your Retro NFT">

    <script>
        async function processSelfie(file) {
            const img = new Image();
            img.src = URL.createObjectURL(file);
            await new Promise(r => img.onload = r);

            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 1024;
            canvas.height = 1024;

            // ==================== CONFIG ====================
            let deletionRate = 0.00;     // controls COLOR (0.50 = grayscale, 0.00 = colorful)
            const pixelSize = 32;
            const brightnessBoost = 80;
            const skullTransparency = 0.05;
            const skullChance = 0.10;
            // ===============================================

            // 1. Center-crop to square
            const originalW = img.width;
            const originalH = img.height;
            const size = Math.min(originalW, originalH);
            const sx = (originalW - size) / 2;
            const sy = (originalH - size) / 2;
            ctx.drawImage(img, sx, sy, size, size, 0, 0, 1024, 1024);

            // === SELF-CENSOR: Skin detection ===
            let skinCount = 0;
            let tempData = ctx.getImageData(0, 0, 1024, 1024).data;
            for (let i = 0; i < tempData.length; i += 4) {
                const r = tempData[i];
                const g = tempData[i + 1];
                const b = tempData[i + 2];
                if (r > 90 && g > 40 && b > 20 && r > g && r > b) {
                    skinCount++;
                }
            }
            const skinPercentage = (skinCount / (1024 * 1024)) * 100;

            let blackHoleRate = deletionRate;
            if (skinPercentage > 35) {
                blackHoleRate = Math.max(deletionRate, 0.65);
                console.log("High skin detected — extra black holes applied");
            }

            // 2. Pixelate
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = 1024 / pixelSize;
            tempCanvas.height = 1024 / pixelSize;
            const tCtx = tempCanvas.getContext('2d');
            tCtx.imageSmoothingEnabled = false;
            tCtx.drawImage(canvas, 0, 0, tempCanvas.width, tempCanvas.height);

            ctx.imageSmoothingEnabled = false;
            ctx.drawImage(tempCanvas, 0, 0, 1024, 1024);

            // 3. Gradual color → grayscale (always uses original deletionRate)
            let imageData = ctx.getImageData(0, 0, 1024, 1024);
            let data = imageData.data;
            const colorStrength = Math.max(0, 1 - deletionRate * 2);

            for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];
                const gray = (r + g + b) / 3;

                data[i]   = Math.min(255, gray + (r - gray) * colorStrength * 1.4);
                data[i+1] = Math.min(255, gray + (g - gray) * colorStrength * 1.4);
                data[i+2] = Math.min(255, gray + (b - gray) * colorStrength * 1.4);
            }
            ctx.putImageData(imageData, 0, 0);

            // 4. Brightness boost
            imageData = ctx.getImageData(0, 0, 1024, 1024);
            data = imageData.data;
            for (let i = 0; i < data.length; i += 4) {
                data[i]   = Math.min(255, data[i]   + brightnessBoost);
                data[i+1] = Math.min(255, data[i+1] + brightnessBoost);
                data[i+2] = Math.min(255, data[i+2] + brightnessBoost);
            }
            ctx.putImageData(imageData, 0, 0);

            // 5. Draw colored blocks + transparent randomly rotated skulls
            const gridSize = 1024 / pixelSize;
            ctx.fillStyle = "#111";
            ctx.fillRect(0, 0, 1024, 1024);

            for (let y = 0; y < gridSize; y++) {
                for (let x = 0; x < gridSize; x++) {
                    const pixelData = tCtx.getImageData(x, y, 1, 1).data;
                    let r = pixelData[0];
                    let g = pixelData[1];
                    let b = pixelData[2];

                    const gray = (r + g + b) / 3;
                    r = Math.min(255, gray + (r - gray) * colorStrength * 1.4);
                    g = Math.min(255, gray + (g - gray) * colorStrength * 1.4);
                    b = Math.min(255, gray + (b - gray) * colorStrength * 1.4);
                    r = Math.min(255, r + brightnessBoost);
                    g = Math.min(255, g + brightnessBoost);
                    b = Math.min(255, b + brightnessBoost);

                    ctx.fillStyle = `rgb(${r},${g},${b})`;
                    ctx.fillRect(x * pixelSize, y * pixelSize, pixelSize, pixelSize);

                    if (Math.random() < skullChance) {
                        ctx.save();
                        const centerX = x * pixelSize + pixelSize / 2;
                        const centerY = y * pixelSize + pixelSize / 2;
                        ctx.translate(centerX, centerY);
                        ctx.rotate((Math.random() * 70 - 35) * Math.PI / 180);

                        ctx.globalAlpha = skullTransparency;
                        ctx.fillStyle = "#111";
                        ctx.font = `${pixelSize * 0.72}px Arial`;
                        ctx.textAlign = "center";
                        ctx.textBaseline = "middle";
                        ctx.fillText("💀", 0, 0);

                        ctx.globalAlpha = 1.0;
                        ctx.restore();
                    }
                }
            }

            // 6. Grainy black holes (ALWAYS uses original deletionRate + censor boost)
            const grainRate = Math.max(deletionRate, 0.45);   // keeps the grainy look you like
            if (grainRate > 0) {
                imageData = ctx.getImageData(0, 0, 1024, 1024);
                data = imageData.data;
                for (let i = 0; i < data.length; i += 4) {
                    const brightness = (data[i] + data[i+1] + data[i+2]) / 3;
                    const darknessFactor = (255 - brightness) / 255;
                    if (Math.random() < grainRate * darknessFactor * 1.15) {
                        data[i] = data[i+1] = data[i+2] = 0;
                        data[i+3] = 255;
                    }
                }
                ctx.putImageData(imageData, 0, 0);
            }

            return canvas.toDataURL('image/png');
        }

        async function processAndShow(file) {
            const resultImg = document.getElementById('result');
            try {
                const base64 = await processSelfie(file);
                if (base64) resultImg.src = base64;
            } catch (err) {
                console.error(err);
                alert('Something went wrong. Please try another photo.');
            }
        }

        function selectGallery() {
            document.getElementById('galleryInput').click();
        }

        function selectCamera() {
            document.getElementById('cameraInput').click();
        }

        document.getElementById('galleryInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file) await processAndShow(file);
        });

        document.getElementById('cameraInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file) await processAndShow(file);
        });
    </script>
</body>
</html>
